services:
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-laravel}_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - postgres

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${APP_NAME:-laravel}_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      FACE_SERVER_HOST: face-server
      FACE_SERVER_PORT: ${FACE_HTTP_PORT:-5001}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      MAIL_MAILER: ${MAIL_MAILER:-log}
    depends_on:
      postgres:
        condition: service_healthy

  node:
    image: node:22-alpine
    container_name: ${APP_NAME:-laravel}_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm install && npm run build -- --watch"]

  postgres:
    image: ankane/pgvector:latest
    container_name: ${APP_NAME:-laravel}_postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-laravel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  face-server:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: ${APP_NAME:-laravel}_face_server
    ports:
      - "${FACE_HTTP_PORT:-5001}:5001"
      - "${FACE_WS_PORT:-5002}:5002"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./storage/app/public/fotos:/app/storage/app/public/fotos
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
